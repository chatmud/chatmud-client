services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        COMMIT_SHA: ${COMMIT_SHA:-dev}
    ports:
      - "${PORT:-3001}:80"
    depends_on:
      - proxy

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-dev}
    expose:
      - "3001"
    environment:
      - PORT=3001
      - UPSTREAM_URL=${UPSTREAM_URL:-}
      - PERSISTENCE_TIMEOUT_MS=${PERSISTENCE_TIMEOUT_MS:-}
      - MAX_BUFFER_LINES=${MAX_BUFFER_LINES:-}
      - USE_PROXY_PROTOCOL=${USE_PROXY_PROTOCOL:-}
